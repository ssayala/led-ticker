name: firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed to attach binaries to a release on tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -d firmware -e esp32-s3

      # Gather the four images a full flash needs. We ship them as separate
      # parts (not a merged image) so each binary keeps the flash header the
      # build produced — no flash-size/mode guesswork. The web flasher
      # (docs/firmware/manifest.json) writes them at these offsets:
      #   0x0      bootloader.bin
      #   0x8000   partitions.bin
      #   0xe000   boot_app0.bin   (from the Arduino framework package)
      #   0x10000  firmware.bin
      - name: Collect flash images
        run: |
          set -euo pipefail
          BUILD=firmware/.pio/build/esp32-s3
          mkdir -p dist
          cp "$BUILD/firmware.bin"   dist/firmware.bin
          cp "$BUILD/bootloader.bin" dist/bootloader.bin
          cp "$BUILD/partitions.bin" dist/partitions.bin
          boot_app0=$(find "$HOME/.platformio/packages" -name boot_app0.bin | head -1)
          cp "$boot_app0" dist/boot_app0.bin
          ls -l dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32-s3
          path: dist/*.bin

      # On a version tag (v0.4.3, …) publish a release with the binaries.
      # The web flasher reads them via releases/latest/download/<name>.bin.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.bin
          generate_release_notes: true

  # The browser flasher fetches the binaries same-origin from the Pages site
  # (GitHub release assets send no CORS headers, so a cross-origin fetch from
  # ledticker.app is blocked). On each release tag, refresh the binaries
  # committed under docs/firmware/ so the flasher always serves the latest.
  sync-flasher:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: firmware-esp32-s3
          path: docs/firmware

      - name: Refresh flasher binaries + manifest version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Sync the manifest version to the tag (v0.4.3 -> 0.4.3) so the
          # flash page shows the right release number.
          version="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${version}\"/" docs/firmware/manifest.json
          git add docs/firmware/*.bin docs/firmware/manifest.json
          if git diff --cached --quiet; then
            echo "no changes"; exit 0
          fi
          # [skip ci] so this push doesn't re-trigger the firmware workflow.
          git commit -m "ci: refresh web flasher to ${GITHUB_REF_NAME} [skip ci]"
          git push origin HEAD:main
