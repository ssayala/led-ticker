name: firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed to attach binaries to a release on tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -d firmware -e esp32-s3

      # Gather the four images a full flash needs. We ship them as separate
      # parts (not a merged image) so each binary keeps the flash header the
      # build produced — no flash-size/mode guesswork. The web flasher
      # (docs/firmware/manifest.json) writes them at these offsets:
      #   0x0      bootloader.bin
      #   0x8000   partitions.bin
      #   0xe000   boot_app0.bin   (from the Arduino framework package)
      #   0x10000  firmware.bin
      - name: Collect flash images
        run: |
          set -euo pipefail
          BUILD=firmware/.pio/build/esp32-s3
          mkdir -p dist
          cp "$BUILD/firmware.bin"   dist/firmware.bin
          cp "$BUILD/bootloader.bin" dist/bootloader.bin
          cp "$BUILD/partitions.bin" dist/partitions.bin
          boot_app0=$(find "$HOME/.platformio/packages" -name boot_app0.bin | head -1)
          cp "$boot_app0" dist/boot_app0.bin
          ls -l dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32-s3
          path: dist/*.bin

      # On a version tag (v0.4.3, …) publish a release with the binaries.
      # The web flasher reads them via releases/latest/download/<name>.bin.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.bin
          generate_release_notes: true

  # The browser flasher fetches the binaries same-origin from ledticker.app
  # (GitHub release assets send no CORS headers, so a cross-origin fetch is
  # blocked). The site lives in a separate private repo (led-ticker-site), so
  # on each release tag we push the freshly built binaries there, where
  # flash.html serves them same-origin. Auth is a write-scoped deploy key in
  # the SITE_DEPLOY_KEY secret (its public half is a deploy key on that repo).
  sync-flasher:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          name: firmware-esp32-s3
          path: bins

      - name: Push refreshed flasher binaries to the site repo
        env:
          SITE_DEPLOY_KEY: ${{ secrets.SITE_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SITE_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"

          version="${GITHUB_REF_NAME#v}"
          git clone --depth 1 git@github.com:ssayala/led-ticker-site.git site
          cp bins/*.bin site/firmware/
          # Sync the manifest version to the tag (v0.4.3 -> 0.4.3) so the flash
          # page shows the right release number.
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${version}\"/" site/firmware/manifest.json

          cd site
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firmware/*.bin firmware/manifest.json
          if git diff --cached --quiet; then
            echo "no changes"; exit 0
          fi
          git commit -m "flasher: refresh to ${GITHUB_REF_NAME}"
          git push origin HEAD:main
