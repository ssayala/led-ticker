name: publish-pypi

# Publishes the Python client (tools/led_ticker) via Trusted Publishing (OIDC â€”
# no API tokens or stored secrets). Two paths:
#   * Tag push `led-ticker-v0.3.0`          -> real PyPI     (environment `pypi`)
#   * Manual "Run workflow" (Actions tab)   -> TestPyPI      (environment `testpypi`)
#     a dry-run so you can validate the upload before a real release.
# Kept distinct from the firmware's `v*` tags (see firmware.yml) so the two
# release flows never collide.
#
# One-time setup before first use:
#   * PyPI     -> Publishing -> pending publisher: project `led-ticker`,
#                owner `ssayala`, repo `esp32-led-simple`, workflow `publish.yml`,
#                environment `pypi`.
#   * TestPyPI (test.pypi.org) -> same pending publisher, environment `testpypi`.
#   * GitHub   -> Settings -> Environments -> create `pypi` and `testpypi`.
# Release:  bump tools/pyproject.toml version, then
#           git tag led-ticker-v0.3.0 && git push origin led-ticker-v0.3.0
# Dry-run:  Actions -> publish-pypi -> "Run workflow" (from main) -> TestPyPI.

on:
  push:
    tags:
      - 'led-ticker-v*'
  workflow_dispatch:        # manual TestPyPI dry-run

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Check tag matches package version
        if: github.event_name == 'push'
        working-directory: tools
        run: |
          set -euo pipefail
          pkg=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          tag="${GITHUB_REF_NAME#led-ticker-v}"
          echo "package version=$pkg, tag version=$tag"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag led-ticker-v$tag does not match tools/pyproject.toml version $pkg"
            exit 1
          fi

      - name: Build sdist + wheel
        working-directory: tools
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: tools/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Pick the environment (and thus the Trusted Publisher) by trigger:
    # a tag release -> pypi, a manual run -> testpypi.
    environment:
      name: ${{ github.event_name == 'push' && 'pypi' || 'testpypi' }}
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI (dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true   # re-running the same version on TestPyPI is fine

      - name: Publish to PyPI
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@release/v1
