[platformio]
default_envs = esp32-s3

[env:esp32-s3]
platform = espressif32 @ 6.5.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 115200
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default
upload_protocol = esptool

lib_deps =
    majicdesigns/MD_MAX72XX @ ^3.5.1
    majicdesigns/MD_Parola @ ^3.7.3
    bblanchon/ArduinoJson @ ^7.0.0
    h2zero/NimBLE-Arduino @ ^1.4.0

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DCONSOLE_ENABLED=0  # USB serial console off on real hardware (wokwi keeps it on)

board_build.arduino.memory_type = qio_opi


# Wokwi simulator build: the Wokwi ESP32-S3 model has no OPI PSRAM and uses
# QSPI (not OPI) flash, so the real-device qio_opi/BOARD_HAS_PSRAM image fails
# to boot there. This env drops PSRAM and uses qio_qspi so the bootloader runs
# under simulation. Flash/run this in Wokwi; never on the real hardware.
[env:wokwi]
extends = env:esp32-s3
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
board_build.arduino.memory_type = qio_qspi


[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17 -Wall -Wextra
; compile only the pure units — main.cpp needs Arduino headers.
build_src_filter = -<*> +<console.cpp> +<logic.cpp>
test_build_src = yes
